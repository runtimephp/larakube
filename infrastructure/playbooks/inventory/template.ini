# Kuven Kubernetes Cluster Inventory
# This template is populated by the provisioning pipeline (step 11)

[bastion]
# bastion_name ansible_host=BASTION_IP

[controlplane]
# cp1_name ansible_host=CP1_IP
# cp2_name ansible_host=CP2_IP  (HA only)
# cp3_name ansible_host=CP3_IP  (HA only)

[workers]
# worker1_name ansible_host=WORKER1_IP
# worker2_name ansible_host=WORKER2_IP

[cluster:children]
controlplane
workers

[all:vars]
ansible_user=root
ansible_ssh_private_key_file=/home/ubuntu/.ssh/node_key
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

kubernetes_version=1.31
pod_cidr=10.244.0.0/16
service_cidr=10.96.0.0/12
