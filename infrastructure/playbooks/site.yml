---
# Kuven Kubernetes Cluster Bootstrap Playbook
#
# Bootstraps a kubeadm cluster with Cilium CNI.
# Supports single-CP (Multipass) and HA (Hetzner) topologies.
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini site.yml

- name: Prepare all cluster nodes
  hosts: cluster
  become: true
  roles:
    - common

- name: Deploy kube-vip for HA (before kubeadm init)
  hosts: controlplane
  become: true
  roles:
    - role: kube-vip
      when: kube_vip_address is defined

- name: Initialize first control plane node
  hosts: controlplane[0]
  become: true
  roles:
    - kubeadm-init

- name: Fetch kubeconfig to bastion
  hosts: controlplane[0]
  become: true
  tasks:
    - name: Read admin.conf
      ansible.builtin.slurp:
        src: /etc/kubernetes/admin.conf
      register: kubeconfig_content

    - name: Store kubeconfig fact
      ansible.builtin.set_fact:
        kubeconfig_b64: "{{ kubeconfig_content.content }}"

- name: Install Cilium CNI from bastion
  hosts: bastion
  become: true
  tasks:
    - name: Create .kube directory
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: "0700"

    - name: Write kubeconfig to bastion
      ansible.builtin.copy:
        content: "{{ hostvars[groups['controlplane'][0]]['kubeconfig_b64'] | b64decode }}"
        dest: /root/.kube/config
        mode: "0600"

    - name: Include Cilium role
      ansible.builtin.include_role:
        name: cilium

- name: Join additional control plane nodes (HA only)
  hosts: controlplane[1:]
  become: true
  serial: 1
  roles:
    - kubeadm-join-cp

- name: Join worker nodes
  hosts: workers
  become: true
  roles:
    - kubeadm-join-worker
