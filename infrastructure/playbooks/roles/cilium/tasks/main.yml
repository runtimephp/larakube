---
# Install Cilium CNI in kube-proxy replacement mode.
# Runs on the bastion (has kubectl + helm + kubeconfig).

- name: Check if Cilium is already installed
  ansible.builtin.command: kubectl get daemonset -n kube-system cilium
  register: cilium_check
  failed_when: false
  changed_when: false

- name: Add Cilium Helm repo
  ansible.builtin.command: helm repo add cilium https://helm.cilium.io/
  when: cilium_check.rc != 0
  changed_when: true

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  when: cilium_check.rc != 0
  changed_when: true

- name: Get CP node IP for Cilium API server config
  ansible.builtin.set_fact:
    cp_api_host: "{{ hostvars[groups['controlplane'][0]]['ansible_host'] }}"

- name: Install Cilium via Helm
  ansible.builtin.command: >
    helm install cilium cilium/cilium
    --version {{ cilium_version | default('1.16.5') }}
    --namespace kube-system
    --set kubeProxyReplacement=true
    --set k8sServiceHost={{ cp_api_host }}
    --set k8sServicePort=6443
    --set routingMode=tunnel
    --set tunnelProtocol=vxlan
    --set ipam.mode=kubernetes
    --set bpf.masquerade=false
    --set hubble.enabled=true
    --set hubble.relay.enabled=true
  when: cilium_check.rc != 0
  register: cilium_install
  changed_when: cilium_install.rc == 0

- name: Wait for Cilium to be ready
  ansible.builtin.command: >
    kubectl wait --for=condition=ready pod
    -l k8s-app=cilium
    -n kube-system
    --timeout=300s
  changed_when: false
  retries: 3
  delay: 10
